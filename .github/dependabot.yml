# Dependabot — automated dependency-update PRs across every ecosystem in this
# repo. Pairs with the supply-chain controls in AGENTS.md §7-§8: each update PR
# runs the full CI gate (uv.lock sync check, SCA on the pinned closure, hashed
# dev-toolchain install, tests), so a bump that introduces an advisory or breaks
# a test is blocked before merge.
#
# Updates are grouped to reduce PR noise; security updates are never grouped so
# they surface and merge on their own. A human reviews every PR (no auto-merge).
version: 2

updates:
  # --- Python: managed via uv.lock (the dependency source of truth) ----------
  # Dependabot updates uv.lock; regenerate the exported pip locks + SBOM from it
  # (see security/sbom/README.md) when accepting a Python bump.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"
    groups:
      dev-toolchain:
        # ruff, mypy, pytest, bandit, pip-audit, ... — low-risk, batch together.
        dependency-type: "development"
      runtime:
        dependency-type: "production"

  # --- JavaScript: package-lock.json (dashboard/build tooling) ---------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "deps"
    groups:
      npm-all:
        patterns: ["*"]

  # --- GitHub Actions: keep CI action versions current & patched -------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
    groups:
      actions-all:
        patterns: ["*"]
