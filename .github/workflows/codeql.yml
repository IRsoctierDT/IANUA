name: CodeQL
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  schedule:
    - cron: "0 7 * * 1"   # weekly Monday scan
permissions:
  contents: read
  security-events: write
  actions: read   # codeql-action reads the workflow run for telemetry/context

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with: { languages: python }
      # Code Scanning is enabled in repo settings, so analyze uploads SARIF
      # directly and findings appear inline on PRs and in the Security tab.
      - uses: github/codeql-action/analyze@v4
