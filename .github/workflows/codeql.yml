name: CodeQL
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  schedule:
    - cron: "0 7 * * 1"   # weekly Monday scan
permissions:
  contents: read
  security-events: write
  actions: read   # codeql-action reads the workflow run for telemetry/context

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with: { languages: python }
      # upload: never avoids a 403 when GitHub Code Scanning is not yet enabled
      # in the repo settings (Settings → Security → Code scanning).
      # Remove the upload/output overrides and re-enable security-events: write
      # once Code Scanning is turned on — the results will then appear inline on PRs.
      - uses: github/codeql-action/analyze@v4
        with:
          upload: never
          output: sarif-results
      - uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif
          path: sarif-results/
          if-no-files-found: error
