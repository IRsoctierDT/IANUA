# pages.yml — GitHub Pages deployment (AGENTS.md §8)
# Publishes docs/ to GitHub Pages after CI passes on main (workflow_run trigger)
# or on an explicit manual dispatch. Never fires on a raw push, per AGENTS.md
# §5.1/§8 (CI is the security/quality gate before anything reaches the public
# site).
#
# Publish gates (defense in depth, AGENTS.md §5.1/§7-§8):
#   1. CI success — a green CI run on main (lint, tests, SAST, SCA, SBOM, secret
#      scan) is required before this workflow runs at all.
#   2. Human approval — the github-pages environment keeps a *required-reviewer*
#      protection rule, so the deploy waits for an operator to approve it (§5.1:
#      external/deploy actions stay human-in-the-loop). This is intentional.
#
# Why ONE job (not the canonical build/deploy split):
#   The two-job pattern uploads the site artifact in `build` and consumes it in
#   `deploy`. That is safe only when approval is instant. With the human gate in
#   place (gate #2), the deploy can wait hours or days — longer than the Pages
#   artifact's ~1-day retention — so by the time it is approved the artifact has
#   expired and deploy fails with "No artifacts named github-pages were found".
#   Combining build + deploy into a single environment-gated job fixes that: the
#   approval holds the whole job, and once approved the artifact is built,
#   uploaded, and deployed in one shot, so it is always fresh. The approval gate
#   itself is unchanged.
#
# Security posture (AGENTS.md §3):
#   - Minimal permissions: contents:read + pages:write + id-token:write only.
#   - No secrets needed — GITHUB_TOKEN is auto-provisioned.
#   - The pre-deploy steps (checkout, drift check) run trusted, local repo files
#     only — no untrusted or external input — so sharing the job's environment
#     scope with them carries no meaningful additional risk.
#
# Prerequisite (one-time): repo Settings → Pages → Source → "GitHub Actions",
# and set the operator(s) as required reviewers on the github-pages environment.

name: Deploy GitHub Pages

on:
  # Fire only after the full CI workflow completes on main, so the
  # quality/security gates pass before any content reaches the public site.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # On-demand deploy (content-only changes, or operator-initiated publish).
  workflow_dispatch:

# Latest-content-wins. Unlike GitHub's default (cancel-in-progress:false), we
# DO cancel a superseded run: publishing docs is idempotent, the newest commit
# should always win, and — critically — this guarantees a run stuck in `waiting`
# for approval can never permanently block the queue.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Single environment-gated job: approval holds the whole job, then build +
  # upload + deploy all run fresh in one shot (see header for why not split).
  deploy:
    name: Build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    # workflow_run: only proceed if CI succeeded (already filtered to main).
    # workflow_dispatch: only from main — a manual run must never publish docs/
    # from an untested branch, which would bypass the CI-success gate.
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Verify the status page is in sync with its source data
        # Fail closed if docs/status.html or docs/status.json drifted from
        # docs/status.data.json (mirrors the SBOM/lock drift gates in ci.yml).
        # Stdlib-only, no dependency install needed.
        run: python scripts/build_status_page.py --check

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
