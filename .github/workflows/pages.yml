# pages.yml — GitHub Pages deployment (AGENTS.md §8)
# Deploys docs/ to GitHub Pages only after CI passes on main (workflow_run
# trigger) or on an explicit manual dispatch. Never fires on a raw push, per
# AGENTS.md §5.1/§8 (CI gate + manual approval gate for external deploys).
#
# Approval gate: set required reviewers on the "github-pages" environment in
# repo Settings → Environments to enforce human sign-off before deployment.
#
# Prerequisite (one-time): repo Settings → Pages → Source → "GitHub Actions".
#
# Security posture (AGENTS.md §3):
#   - Minimal permissions: contents:read + pages:write + id-token:write only.
#   - No secrets needed — GITHUB_TOKEN is auto-provisioned.
#   - Single concurrency group prevents overlapping deploys.

name: Deploy GitHub Pages

on:
  # Fire only after the full CI workflow completes successfully on main, so the
  # quality/security gates (lint, tests, SAST, SBOM) pass before any content
  # reaches the public Pages site.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # On-demand deploy (content-only changes, or operator-initiated publish).
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    # workflow_run: only proceed if CI succeeded.
    # workflow_dispatch: always allow (operator explicitly requested it).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
