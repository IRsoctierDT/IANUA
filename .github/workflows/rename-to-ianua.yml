# Complete IANUA rename — read-only guard.
#
# The repository-wide rename to IANUA is completed in-tree (every active text
# file was migrated with scripts/rename_to_ianua.py --apply, which is
# deterministic and idempotent). This workflow now only *verifies* that state:
# it runs the migration script in --check mode against the code under test and
# fails if any legacy identifier has been reintroduced.
#
# Deliberate properties (least privilege, fail closed):
#   * contents: read only — no auto-commits, no pushes, no write token.
#   * Checks out the ref under test (the PR's merge ref), never another branch,
#     so the verdict always applies to the change being reviewed.
#   * The earlier apply-and-push automation was removed once the rename landed;
#     re-running the migration is a maintainer action, not a CI side effect.
name: Complete IANUA rename

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: No legacy pre-IANUA identifiers remain
        run: python scripts/rename_to_ianua.py --check
