name: Complete IANUA rename

on:
  push:
    branches:
      - chore/rename-ai-command-center-to-ianua
    paths:
      - scripts/rename_to_ianua.py
      - .github/workflows/rename-to-ianua.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out rename branch
        uses: actions/checkout@v4
        with:
          ref: chore/rename-ai-command-center-to-ianua
          fetch-depth: 0

      - name: Run controlled rename
        run: python scripts/rename_to_ianua.py

      - name: Verify migration script
        run: python scripts/rename_to_ianua.py --check

      - name: Compile Python
        run: python -m compileall agents scripts rag mcp dashboard

      - name: Commit rename results
        run: |
          if git diff --quiet; then
            echo "No rename changes remain."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: complete project-wide rename to IANUA"
          git push origin HEAD:chore/rename-ai-command-center-to-ianua
