# ci.yml — AI Operator Cyber Command Center
# Place at:  .github/workflows/ci.yml
# Mirrors the fail-fast pipeline in AGENTS.md §8. Local pre-commit == this CI.
#
# Stages (ordered, fail-fast):
#   1. Static analysis  -> ruff check + ruff format --check + mypy
#   2. Security         -> bandit (SAST) + pip-audit (SCA) + SBOM (CycloneDX) + gitleaks (secrets)
#   3. Tests            -> pytest with 85% coverage gate (tests/security must pass)
#   4. Build            -> only on a fully green pipeline
#   5. Deploy           -> MANUAL approval gate (GitHub Environment), never automatic

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default (AGENTS.md §3). Jobs opt into more only if needed.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
jobs:
  # ---------------------------------------------------------------- Stage 1
  static-analysis:
    name: Static analysis (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Verify uv.lock is in sync with pyproject.toml
        # uv.lock is the dependency source of truth; fail closed if pyproject
        # changed without re-locking (and the exported pip locks would drift).
        run: uv lock --check
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy agents scripts tests dashboard

  # ---------------------------------------------------------------- Stage 2
  security:
    name: Security (bandit + pip-audit + gitleaks)
    runs-on: ubuntu-latest
    needs: static-analysis
    permissions:
      contents: read
      pull-requests: read   # gitleaks-action lists PR commits via the GitHub API
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0          # gitleaks needs full history
      - uses: actions/setup-python@v6
        with:
          # 3.12, not the global 3.11: requirements.lock pins the declared
          # [dev,dashboard] closure as resolved on Python 3.12 (e.g. numpy 2.5.0,
          # which requires >=3.12). pip-audit -r dry-run-resolves the lock, so it
          # must run on the interpreter the lock was produced for.
          python-version: "3.12"
          cache: pip
      - name: Install hash-pinned dev toolchain (tamper-evident)
        # The security job's own tools (bandit, pip-audit) install from a
        # SHA-256 hash-pinned lock under --require-hashes, so a tampered or
        # substituted distribution fails the build. Versions match
        # requirements.lock; see security/sbom/requirements-dev.lock.
        run: pip install --require-hashes -r security/sbom/requirements-dev.lock
      - name: Bandit (SAST)
        run: bandit -c pyproject.toml -r agents scripts
      - name: pip-audit (SCA) — gate on the pinned closure
        # Audit the committed Linux/3.12 lock (declared [dev,dashboard] closure),
        # not the ephemeral CI environment. --disable-pip reads the fully-hashed
        # lock directly with no resolver, so it is platform-independent and
        # deterministic: a non-zero exit means a NEW advisory landed against a
        # pinned dependency -> block the merge.
        run: pip-audit --disable-pip -r security/sbom/requirements.lock
      - name: Generate SBOM (CycloneDX)
        # Regenerate from the same lock for a reproducible SBOM. pip-audit exits
        # non-zero when advisories exist; the SBOM is still written and the gate
        # above already failed the build, so tolerate it here. npm half is
        # derived offline from the lockfile.
        run: |
          pip-audit --disable-pip -r security/sbom/requirements.lock \
            -f cyclonedx-json -o security/sbom/python.cdx.json \
            --progress-spinner off || true
          python scripts/generate_sbom.py \
            --timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: security/sbom/*.cdx.json
          if-no-files-found: error
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------- Stage 3
  tests:
    name: Tests + coverage gate
    runs-on: ubuntu-latest
    needs: security
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Pytest (coverage >= 85%, security suite must pass)
        run: python -m pytest --cov-report=xml
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------- Stage 4
  # ------------------------------------------------ Stage 3b (parallel to tests)
  sbom-sync:
    name: SBOM & locks in sync with uv.lock
    runs-on: ubuntu-latest
    needs: static-analysis
    permissions:
      contents: read   # read-only: a drift gate, never auto-commits
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install hash-pinned dev toolchain
        run: pip install --require-hashes -r security/sbom/requirements-dev.lock
      - name: Derived pip locks match uv.lock (source of truth)
        run: python scripts/check_locks.py
      - name: SBOM is regenerated from the committed lock
        # Rebuild the SBOM from the committed lock using the committed timestamp;
        # fail closed if the result differs (i.e. a lock changed but the SBOM was
        # not regenerated). Read-only — the maintainer regenerates, CI never
        # commits. python.cdx.json is intentionally not diffed (pip-audit stamps
        # it with a random serial number); the merged SBOM is deterministic.
        run: |
          ts="$(jq -r .metadata.timestamp security/sbom/sbom.cdx.json)"
          cp security/sbom/sbom.cdx.json /tmp/sbom.before.json
          pip-audit --disable-pip -r security/sbom/requirements.lock \
            -f cyclonedx-json -o security/sbom/python.cdx.json --progress-spinner off || true
          python scripts/generate_sbom.py --timestamp "$ts"
          if ! diff -q <(jq -S '.components' /tmp/sbom.before.json) \
                       <(jq -S '.components' security/sbom/sbom.cdx.json) >/dev/null; then
            echo "::error::sbom.cdx.json is stale — regenerate (see security/sbom/README.md)"
            exit 1
          fi
          echo "SBOM components are in sync with the committed lock."

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the signed SBOM attestation
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Attest SBOM for the built artifacts (Sigstore, main only)
        # Bind the CycloneDX SBOM to the built distributions with a signed,
        # keyless (OIDC) attestation in the GitHub attestations store. Only on
        # push to main — PRs (incl. forks) lack the id-token to sign, and we
        # only attest artifacts that actually land.
        #
        # Skip condition: the Attestations API returns "Feature not available
        # for user-owned private repositories" for exactly this repo class.
        # We skip (not continue-on-error) so that permission failures, wrong
        # paths, or API errors still break the build in public repos and GHAS
        # orgs where attestation is actually supported.
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          !(github.event.repository.private == true &&
            github.event.repository.owner.type == 'User')
        # continue-on-error: GitHub Attestations API rejects private user-owned
        # repos with "Feature not available for user-owned private repositories".
        # This keeps the build green while the step is non-functional; remove
        # this flag if the repo is made public or transferred to a GHAS org.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/attest-sbom@v4
        with:
          subject-path: "dist/*"
          sbom-path: "security/sbom/sbom.cdx.json"

  # ---------------------------------------------------------------- Stage 5
  deploy:
    name: Deploy (manual approval gate)
    runs-on: ubuntu-latest
    needs: build
    # Only ever runs on an explicit, manual dispatch from main — never on PRs.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment:
      name: production        # configure required reviewers in repo Settings > Environments
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Deploy placeholder
        run: |
          echo "Human approval recorded via the 'production' environment gate (AGENTS.md §5.1)."
          echo "Wire the real deploy step here. Keep secrets in the env's secret store only."

