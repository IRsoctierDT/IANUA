# ci.yml — AI Operator Cyber Command Center
# Place at:  .github/workflows/ci.yml
# Mirrors the fail-fast pipeline in AGENTS.md §8. Local pre-commit == this CI.
#
# Stages (ordered, fail-fast):
#   1. Static analysis  -> ruff check + ruff format --check + mypy
#   2. Security         -> bandit (SAST) + pip-audit (SCA) + gitleaks (secrets)
#   3. Tests            -> pytest with 85% coverage gate (tests/security must pass)
#   4. Build            -> only on a fully green pipeline
#   5. Deploy           -> MANUAL approval gate (GitHub Environment), never automatic

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default (AGENTS.md §3). Jobs opt into more only if needed.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
jobs:
  # ---------------------------------------------------------------- Stage 1
  static-analysis:
    name: Static analysis (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy agents scripts tests dashboard

  # ---------------------------------------------------------------- Stage 2
  security:
    name: Security (bandit + pip-audit + gitleaks)
    runs-on: ubuntu-latest
    needs: static-analysis
    permissions:
      contents: read
      pull-requests: read   # gitleaks-action@v2 lists PR commits via the GitHub API
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # gitleaks needs full history
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Bandit (SAST)
        run: bandit -c pyproject.toml -r agents scripts
      - name: pip-audit (SCA)
        run: pip-audit
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------- Stage 3
  tests:
    name: Tests + coverage gate
    runs-on: ubuntu-latest
    needs: security
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Pytest (coverage >= 85%, security suite must pass)
        run: python -m pytest --cov-report=xml
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------- Stage 4
  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ---------------------------------------------------------------- Stage 5
  deploy:
    name: Deploy (manual approval gate)
    runs-on: ubuntu-latest
    needs: build
    # Only ever runs on an explicit, manual dispatch from main — never on PRs.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment:
      name: production        # configure required reviewers in repo Settings > Environments
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Deploy placeholder
        run: |
          echo "Human approval recorded via the 'production' environment gate (AGENTS.md §5.1)."
          echo "Wire the real deploy step here. Keep secrets in the env's secret store only."
