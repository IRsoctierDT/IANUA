title: SSH Failed Password
name: ssh_failed_password
id: dc593d6d-6a6c-4c3a-b95d-caf92008e2cd
status: experimental
description: >-
  A single failed SSH password authentication. Low-signal on its own; it is the
  building block for the brute-force and brute-force-then-success correlations.
references:
  - https://attack.mitre.org/techniques/T1110/
author: IANUA
date: 2026-06-19
tags:
  - attack.credential-access
  - attack.t1110
logsource:
  product: linux
  service: sshd
detection:
  selection:
    message|contains: "Failed password"
  condition: selection
fields:
  - src_ip
  - user
falsepositives:
  - Users occasionally mistyping a password
level: low
