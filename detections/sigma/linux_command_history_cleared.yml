title: Linux Command History Cleared
id: 10c33577-afe7-48e3-a767-1a36cf007f32
status: experimental
description: >-
  Shell command history was cleared, deleted, or disabled (history -c, removal
  or shredding of .bash_history, unsetting HISTFILE) — a defense-evasion action
  with almost no legitimate day-to-day use. Investigate what preceded it.
references:
  - https://attack.mitre.org/techniques/T1070/003/
author: AI Operator Cyber Command Center
date: 2026-07-19
tags:
  - attack.defense-evasion
  - attack.t1070.003
logsource:
  product: linux
detection:
  selection:
    message|contains:
      - "history -c"
      - "rm ~/.bash_history"
      - "rm -f ~/.bash_history"
      - "shred ~/.bash_history"
      - "unset HISTFILE"
      - "export HISTFILESIZE=0"
  condition: selection
fields:
  - user
  - host
falsepositives:
  - Privacy-conscious users clearing history manually (rare on servers)
level: high
