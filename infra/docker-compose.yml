# Local lab stack for IANUA.
# Secure-by-default (AGENTS.md §3/§5):
#   * Every port binds to 127.0.0.1 only — no external exposure (default-deny egress).
#   * Image tags are pinned — never :latest.
#   * Secrets come from .env (gitignored); none are baked in. Postgres fails closed
#     if POSTGRES_PASSWORD is unset.
#   * Named volumes persist data under Docker, never in the repo working tree.
#
# Usage:  cp ../.env.example ../.env  &&  edit ../.env  &&  docker compose --env-file ../.env up -d

services:
  ollama:
    image: ollama/ollama:0.5.4
    container_name: aiocc-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: aiocc-qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: aiocc-postgres
    # Provisioned to match the Environment Setup "Required Local Stack"; not yet
    # used by application code. Remove if you do not need it.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiocc}
      POSTGRES_DB: ${POSTGRES_DB:-aiocc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiocc} -d ${POSTGRES_DB:-aiocc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama:
  qdrant:
  postgres:
